version: 1
kind: runtime-jobs
metadata:
  name: autoresearchclaw-runtime-jobs
  source_scope:
    - README.md
    - .codex/skills/*/SKILL.md
    - skills/*/SKILL.md
    - skills/*/README.md
  phase: 1-control-plane-manifest

defaults:
  runtime_host: openclaw-ec2
  workspace: ~/.openclaw/workspace
  gateway_base_url: http://127.0.0.1:18789/v1
  timezone: Asia/Seoul

jobs:
  - id: prompt-governance-validate
    name: Prompt governance validation
    type: local-check
    owner_agent: workspace-operator
    command_refs:
      - python3 scripts/check-prompt-governance.py
      - python3 -m unittest tests/test_prompt_governance.py
    triggers:
      - before workspace deploy
      - manual
    outputs:
      - validated prompt registry and governance contract
    safety:
      side_effects: local read-only validation
      secrets: none

  - id: openclaw-workspace-deploy
    name: Deploy OpenClaw workspace control files
    type: operator-command
    owner_agent: workspace-operator
    command_refs:
      - bash scripts/deploy-openclaw-workspace.sh
    triggers:
      - manual
    depends_on:
      - prompt-governance-validate
    target:
      host: openclaw-ec2
      path: ~/.openclaw/workspace
    outputs:
      - workspace control files
      - prompt registry
    safety:
      side_effects: remote workspace file sync
      secrets: do not print gateway tokens

  - id: openclaw-ops-readiness-check
    name: Check remote OpenClaw ops readiness
    type: health-check
    owner_agent: openclaw-ec2-ops
    command_refs:
      - bash scripts/check-openclaw-ops.sh
      - skills/openclaw-ec2-ops/gateway-status.sh
      - skills/openclaw-ec2-ops/gateway-health.sh
      - skills/openclaw-ec2-ops/service-status.sh
      - skills/openclaw-ec2-ops/recent-log.sh
      - skills/openclaw-ec2-ops/workspace-summary.sh
    triggers:
      - manual
      - after deploy
    checks:
      - gateway service state
      - loopback listener
      - /v1/models probe
      - Discord bridge service
      - ResearchClaw install surface
      - paper-recommender status
      - recent warning/error log signal
    safety:
      side_effects: read-only remote inspection
      secrets: never print gateway token values

  - id: hermes-workspace-deploy
    name: Deploy Hermes canary workspace control files
    type: operator-command
    owner_agent: hermes-ec2-ops
    command_refs:
      - bash scripts/deploy-hermes-workspace.sh
    triggers:
      - manual canary only
    depends_on:
      - prompt-governance-validate
    target:
      host: openclaw-ec2
      path: ~/.hermes/workspace
    outputs:
      - Hermes canary workspace control files
      - prompt registry
    safety:
      side_effects: remote canary workspace file sync only
      secrets: do not print Hermes or OpenClaw gateway tokens

  - id: hermes-ops-readiness-check
    name: Check remote Hermes canary ops readiness
    type: health-check
    owner_agent: hermes-ec2-ops
    command_refs:
      - bash scripts/check-hermes-ops.sh
    triggers:
      - manual canary only
      - after Hermes canary deploy
    checks:
      - Hermes canary service state
      - loopback listener
      - /v1/models probe
      - Discord bridge Hermes env aliases
      - recent Hermes warning/error log signal
    safety:
      side_effects: read-only remote canary inspection
      secrets: never print Hermes or OpenClaw gateway token values

  - id: hermes-bridge-smoke-check
    name: Check Discord bridge against Hermes canary chat API
    type: health-check
    owner_agent: hermes-ec2-ops
    command_refs:
      - bash scripts/check-hermes-bridge-smoke.sh
    triggers:
      - manual canary only
      - after Hermes canary readiness passes
      - before production cutover
    depends_on:
      - hermes-ops-readiness-check
    checks:
      - Discord bridge imports from the Hermes canary workspace
      - Hermes env aliases select the canary loopback gateway
      - canary OpenAI-compatible chat smoke returns the expected sentinel
    safety:
      side_effects: remote canary OpenAI-compatible chat smoke only
      secrets: never print Hermes, OpenClaw, Discord, or provider token values

  - id: hermes-bridge-canary-service-install
    name: Install guarded Hermes canary Discord bridge service
    type: operator-command
    owner_agent: hermes-ec2-ops
    command_refs:
      - bash scripts/install-hermes-bridge-canary-service.sh
    triggers:
      - manual canary only
      - after Hermes bridge smoke passes
      - before production cutover
    depends_on:
      - hermes-bridge-smoke-check
    outputs:
      - guarded disabled service unit
      - Hermes canary bridge .env with loopback Hermes aliases
    safety:
      side_effects: installs a disabled user service unit and canary .env only
      secrets: copies existing remote Discord/provider tokens on-host but never prints token values

  - id: hermes-auxiliary-bot-service-install
    name: Install or cut over Hermes auxiliary Discord bot services
    type: operator-command
    owner_agent: hermes-ec2-ops
    command_refs:
      - bash scripts/install-hermes-auxiliary-bot-services.sh
    triggers:
      - manual canary only
      - after Hermes bridge cutover is stable
      - before OpenClaw gateway decommission
    depends_on:
      - hermes-bridge-canary-service-install
    outputs:
      - guarded auxiliary bot service units
      - optional reversible cutover when HERMES_AUX_CUTOVER=1
    safety:
      side_effects: installs Hermes auxiliary user units by default; stops old and starts new only when HERMES_AUX_CUTOVER=1
      secrets: copies existing remote Discord/provider env on-host but never prints token values

  - id: openclaw-dashboard-tunnel
    name: Open dashboard over SSH tunnel
    type: operator-command
    owner_agent: openclaw-ec2-ops
    command_refs:
      - bash scripts/openclaw-dashboard-tunnel.sh
    triggers:
      - manual
    target:
      local_url: http://127.0.0.1:18789
    safety:
      side_effects: local SSH tunnel process
      secrets: none

  - id: researchclaw-validate
    name: Validate AutoResearchClaw on OpenClaw gateway
    type: remote-check
    owner_agent: researchclaw
    command_refs:
      - skills/researchclaw/validate.sh
      - skills/researchclaw/doctor.sh
    triggers:
      - before first topic run after config changes
      - manual
    target:
      repo: ~/.openclaw/workspace/projects/AutoResearchClaw
      config: ~/.openclaw/workspace/projects/AutoResearchClaw/config.yaml
    safety:
      side_effects: validation only
      secrets: read OPENCLAW_GATEWAY_TOKEN from ~/.openclaw_gateway_token

  - id: researchclaw-topic-run
    name: Run AutoResearchClaw topic research and sync results
    type: operator-command
    owner_agent: researchclaw
    command_refs:
      - bash scripts/run-researchclaw-topic.sh "<topic>"
      - bash scripts/sync-researchclaw-results.sh
      - skills/researchclaw/run-topic.sh "<topic>"
    triggers:
      - manual explicit topic request
    depends_on:
      - researchclaw-validate
    outputs:
      - local Obsidian AutoResearchClaw result tree
    safety:
      side_effects: remote research execution and local result sync
      secrets: keep gateway token on loopback path only

  - id: paper-recommender-daily
    name: Daily paper recommendation pipeline
    type: cron
    owner_agent: paper-recommender
    command_refs:
      - bash skills/paper-recommender/install-cron.sh
      - skills/paper-recommender/run-once.sh
      - skills/paper-recommender/sync-results.sh
    schedule:
      cron_utc: "0 23 * * *"
      local_time: "08:00 Asia/Seoul"
    target:
      project_dir: ~/.openclaw/workspace/projects/paper-recommender
      entrypoint: .venv/bin/paper-recommender
      config: ~/.openclaw/workspace/projects/paper-recommender/config.yaml
    outputs:
      - artifacts/YYYY-MM-DD/recommendations.md
      - artifacts/YYYY-MM-DD/raw.json
      - state/ab_log.jsonl
    safety:
      side_effects: remote recommendation run and optional local Obsidian sync
      secrets: JIPHYEONJEON_TOKEN in remote .env; gateway token read at runtime

  - id: newsletter-ingest-local-daily
    name: Local newsletter export ingest into wiki archive
    type: local-scheduled-boundary
    owner_agent: paper-recommender
    command_refs:
      - skills/paper-recommender/run-daily-research-and-sync.sh
      - skills/paper-recommender/run-newsletter-ingest.sh
      - python3 skills/paper-recommender/newsletter_ingest.py
      - python3 skills/paper-recommender/gmail_newsletter_fetch.py --auth --publish
    schedule:
      local_time: "07:00 Asia/Seoul when locally installed"
    inputs:
      - ~/Desktop/paper-wiki/newsletter-exports/*.mbox
      - ~/Desktop/paper-wiki/newsletter-exports/*.jsonl
      - optional Gmail API readonly token outside git
    outputs:
      - raw/newsletters/YYYY-MM-DD/items.json
      - pages/newsletter-ingest-YYYY-MM-DD.md
    safety:
      side_effects: local wiki archive writes
      secrets: OAuth token remains outside git; full email bodies omitted from wiki outputs

  - id: apps-script-newsletter-relay
    name: Google Apps Script newsletter archive relay
    type: external-relay
    owner_agent: newsletter-archive-relay
    command_refs:
      - integrations/google-apps-script/newsletter_archive_to_discord.gs
      - python3 skills/paper-recommender/apps_script_relay_ingest.py
    triggers:
      - Apps Script scheduled run
      - EC2 relay pull
    inputs:
      - Gmail messages via Apps Script
      - RELAY_READ_TOKEN
    outputs:
      - sanitized newsletter archive payload for downstream posting
    safety:
      side_effects: Gmail read and relay pull
      secrets: Google Script Properties and relay token are not committed

  - id: discord-openclaw-bridge-service
    name: Discord OpenClaw bridge service
    type: systemd-user-service
    owner_agent: discord-openclaw-bridge
    command_refs:
      - bash scripts/deploy-discord-openclaw-bridge.sh
      - skills/discord-openclaw-bridge/project/scripts/install.sh
      - systemctl --user start discord-openclaw-bridge.service
      - skills/discord-openclaw-bridge/project/scripts/status.sh
    target:
      project_dir: ~/.openclaw/workspace/skills/discord-openclaw-bridge/project
      service: discord-openclaw-bridge.service
      guild_id: "<DISCORD_GUILD_ID>"
      channel_id: "<DISCORD_ALLOWED_CHANNEL_ID>"
    interfaces:
      - /openclaw
      - /openclaw_status
      - /jiphyeonjeon_briefing
    safety:
      side_effects: Discord slash-command responses
      secrets: DISCORD_BOT_TOKEN in project .env only

  - id: discord-jiphyeonjeon-miner-service
    name: Jiphyeonjeon Miner intake bot service
    type: systemd-user-service
    owner_agent: jiphyeonjeon-miner
    command_refs:
      - skills/discord-openclaw-bridge/project/scripts/invite-miner-url.sh
      - skills/discord-openclaw-bridge/project/scripts/install-miner.sh
      - systemctl --user start discord-jiphyeonjeon-miner.service
    target:
      service: discord-jiphyeonjeon-miner.service
      channel_env: DISCORD_MINER_CHANNEL_ID
    outputs:
      - ~/.openclaw/workspace/review/jiphyeonjeon-claw/link-review-queue.jsonl
      - ~/.openclaw/workspace/review/jiphyeonjeon-claw/link-review-decisions.jsonl
      - ~/.openclaw/workspace/manual_links/approved-manual-links.jsonl
    safety:
      side_effects: Discord link intake and append-only review records
      secrets: persisted metadata limited to Discord IDs and sanitized URLs

  - id: jiphyeonjeon-miner-review
    name: Jiphyeonjeon Miner approval review
    type: operator-command
    owner_agent: jiphyeonjeon-claw
    command_refs:
      - uv run discord-jiphyeonjeon-miner-review list
      - uv run discord-jiphyeonjeon-miner-review show <intake_id>
      - uv run discord-jiphyeonjeon-miner-review approve <intake_id> --reason "<reason>"
      - uv run discord-jiphyeonjeon-miner-review reject <intake_id> --reason "<reason>"
      - uv run discord-jiphyeonjeon-miner-review hold <intake_id> --reason "<reason>"
      - uv run discord-jiphyeonjeon-miner-review export
    triggers:
      - manual review of pending intake
    safety:
      side_effects: append-only review decision and approved export
      secrets: pending queues are never newsletter inputs

  - id: discord-card-news-publish
    name: Discord card-news publisher
    type: cron-and-manual
    owner_agent: card-news-publisher
    command_refs:
      - bash skills/discord-openclaw-bridge/install-newsletter-archive-cron.sh
      - skills/discord-openclaw-bridge/project/scripts/run-newsletter-archive-and-cardnews.sh
      - skills/discord-openclaw-bridge/project/scripts/run-daily-jiphyeonjeon-briefing.sh
      - bash skills/discord-openclaw-bridge/install-card-news-cron.sh
      - skills/discord-openclaw-bridge/project/scripts/post-card-news.sh
      - skills/discord-openclaw-bridge/project/scripts/post-newsletter-briefing.sh
      - skills/discord-openclaw-bridge/project/scripts/post-briefing.sh
    schedule:
      cron_utc: "0 23 * * *"
      local_time: "08:00 Asia/Seoul"
      delay: waits briefly for fresh newsletter archive
    inputs:
      - raw/newsletters/YYYY-MM-DD/items.json
      - DISCORD_BRIEFING_SOURCE
      - DISCORD_NEWSLETTER_BRIEFING_SOURCE
    pre_publish_checks:
      - jiphyeonjeon-editor-canonical-identity-report
      - jiphyeonjeon-advisor-evidence-quality-gate
    outputs:
      - Discord card-news thread or channel post
      - card-news-publication-audit.jsonl
      - jiphyeonjeon-trust-gates/*.json
    safety:
      side_effects: public Discord posting and optional previous-post purge after Editor/Advisor gates pass
      secrets: audit records and trust-gate reports must contain sanitized public metadata only


  - id: jiphyeonjeon-blog-publish
    name: Jiphyeonjeon Reporter newsroom blog publisher
    type: manual-publication
    owner_agent: jiphyeonjeon-blog-publisher
    command_refs:
      - skills/discord-openclaw-bridge/project/scripts/post-blog.sh --source <approved-blog-draft.md> --dry-run
      - uv run discord-openclaw-post-blog --source <approved-blog-draft.md> --dry-run
      - uv run discord-openclaw-post-blog --source <approved-blog-draft.md> --publish --approval-id <operator-approval-id>
    triggers:
      - manual after blog draft generation and editorial review
      - manual after Claw-approved or newsletter/card-news artifacts are promoted to a blog draft
    inputs:
      - approved blog draft markdown/json with public source URLs
      - jiphyeonjeon-editor advisory identity report
      - jiphyeonjeon-advisor advisory evidence verdict
      - explicit operator approval id or approval artifact for live publish
    pre_publish_checks:
      - jiphyeonjeon-editor-canonical-identity-report
      - jiphyeonjeon-advisor-evidence-quality-gate
      - explicit credentialed operator approval for live POST/PUT only
    outputs:
      - Blog API-compatible dry-run payload
      - sanitized blog-publication-audit.jsonl
      - optional public blog post id/slug after approved POST/PUT
    safety:
      side_effects: dry-run by default; live public blog POST/PUT only after --publish, valid token, advisory prerequisites, and approval id/artifact
      secrets: never print Jiphyeonjeon tokens, webhook URLs, raw private newsletter bodies, or local secret paths
      destructive_actions: no DELETE, takedown, purge, or destructive blog API command is exposed
      advisory_boundary: Editor and Advisor are advisory prerequisites/verdicts only and do not approve promotion

  - id: jiphyeonjeon-traveler-source-discovery
    name: Discover durable high-trust collection sources
    type: research-and-review
    owner_agent: jiphyeonjeon-traveler
    command_refs:
      - /jiphyeonjeon_travel topic:<topic> min_sources_to_review:<count>
      - uv run discord-openclaw-traveler-scout
      - uv run discord-openclaw-traveler-scout --dry-run
      - uv run discord-openclaw-traveler-discover-sources
      - uv run discord-openclaw-traveler-discover-sources --dry-run
      - python3 scripts/paperwiki_kg.py scout-topics --base runtime/traveler-scout-topics.json
      - web research over public metadata/source/newsletter/article endpoints
      - update JIPHYEONJEON_TRAVELER_RESEARCH_QUEUE_PATH with requested or autonomous scout deep-research requests
      - update JIPHYEONJEON_TRAVELER_SOURCE_QUEUE_PATH and JIPHYEONJEON_TRAVELER_SCOUT_QUEUE_PATH with evidence-backed candidate source records
      - route accepted candidates to 집현전-광부 seed expansion or 집현전-클로 review
    triggers:
      - manual source discovery request
      - after repeated low-yield or duplicate-heavy Miner seed runs
      - periodic source portfolio refresh
    inputs:
      - public web search results
      - existing Miner seed status and source yield summaries
      - 집현전-Claw technical relevance criteria
      - optional PaperWiki KG active-interest scout topics via PAPERWIKI_KG_DB
      - explicit PaperWiki KG enable flag JIPHYEONJEON_TRAVELER_ENABLE_PAPERWIKI_KG=1
      - bounded daily scout topic cap JIPHYEONJEON_TRAVELER_SCOUT_MAX_TOPICS
      - committed fallback runtime/traveler-scout-topics.json
    outputs:
      - deep-research request queue requiring many-source comparison
      - source candidate queue with reliability, cadence, feasibility, rejected-source evidence, and next-action fields
      - recommended Miner seed additions for operator review
    safety:
      side_effects: source recommendations only; no automatic scraping, approval, or Discord posting
      secrets: public source metadata only; do not store private newsletters, login content, or tokens
      paperwiki_boundary: PaperWiki KG is advisory, opt-in, and optional; only public traveler_scout/export_scope interests can influence scout topics; missing or unhealthy KG falls back to committed scout topics and never bypasses evidence collection or Claw review

  - id: jiphyeonjeon-traveler-daily-collection-report
    name: Daily Traveler additional-collection report
    type: cron
    owner_agent: jiphyeonjeon-traveler
    command_refs:
      - bash skills/discord-openclaw-bridge/install-traveler-collection-report-cron.sh
      - bash skills/discord-openclaw-bridge/project/scripts/run-traveler-collection-report.sh
      - python3 scripts/paperwiki_kg.py scout-topics --base runtime/traveler-scout-topics.json
      - uv run discord-openclaw-traveler-scout
      - uv run discord-openclaw-traveler-discover-sources
      - uv run discord-openclaw-post-traveler-collection-report
    schedule:
      cron_utc: "0 13 * * *"
      local_time: "22:00 Asia/Seoul"
    depends_on:
      - jiphyeonjeon-traveler-source-discovery
    inputs:
      - JIPHYEONJEON_TRAVELER_RESEARCH_QUEUE_PATH
      - JIPHYEONJEON_TRAVELER_SOURCE_QUEUE_PATH
      - JIPHYEONJEON_TRAVELER_SCOUT_QUEUE_PATH
      - optional runtime/traveler-scout-topics.json or JIPHYEONJEON_TRAVELER_SCOUT_TOPICS_PATH
      - optional PaperWiki KG DB path PAPERWIKI_KG_DB for best-effort scout-topic prioritization
      - explicit PaperWiki KG enable flag JIPHYEONJEON_TRAVELER_ENABLE_PAPERWIKI_KG=1
      - bounded daily scout topic cap JIPHYEONJEON_TRAVELER_SCOUT_MAX_TOPICS
      - current Miner seed/intake/review/approved surfaces
    outputs:
      - Discord Traveler forum collection-gap report
      - traveler-scout-last-status.json
      - traveler-source-discovery-last-status.json
      - traveler-collection-report-last-status.json
      - optional traveler-scout-topics.paperwiki.json generated topic artifact
    safety:
      side_effects: public Discord report posting; candidate discovery writes pending review records only
      secrets: Discord bot token remains in remote .env only; report/status must not contain tokens
      paperwiki_boundary: cron must not fail solely because PaperWiki KG is disabled, absent, or unhealthy; KG influence remains explicit opt-in/advisory and candidates still require evidence and review

  - id: discord-miner-seeds-expand
    name: Expand configured Miner seed sources
    type: cron-and-manual
    owner_agent: jiphyeonjeon-miner
    command_refs:
      - bash skills/discord-openclaw-bridge/install-miner-seeds-cron.sh
      - uv run discord-openclaw-miner-seeds
      - uv run discord-openclaw-post-miner-seeds-report
    triggers:
      - installed cron
      - manual seed expansion
    outputs:
      - Miner intake records for eligible seed links
      - Miner seed status/report records
    safety:
      side_effects: collection-only intake; no approval decisions
      secrets: source URLs and public metadata only

  - id: jiphyeonjeon-guard-ops-digest
    name: Jiphyeonjeon Guard operations issue digest
    type: health-check
    owner_agent: jiphyeonjeon-guard
    command_refs:
      - uv run discord-openclaw-guard-ops-digest
      - uv run discord-openclaw-guard-ops-digest --write-issue-queue
      - uv run discord-openclaw-post-miner-seeds-report
      - bash skills/discord-openclaw-bridge/project/scripts/status.sh
    triggers:
      - after miner seed expansion
      - manual operations review
      - remote ops readiness check
    inputs:
      - ~/.openclaw/workspace/state/miner-seeds-last-status.json
      - ~/.openclaw/workspace/state/traveler-collection-report-last-status.json
      - ~/.openclaw/workspace/intake/jiphyeonjeon-miner/links.jsonl
      - ~/.openclaw/workspace/review/jiphyeonjeon-claw/link-review-queue.jsonl
      - ~/.openclaw/workspace/review/jiphyeonjeon-claw/link-review-decisions.jsonl
    outputs:
      - Guard operations issue digest JSON
      - optional append-only Guard operations issue queue
      - operations reporting forum thread for miner-seeds run summaries
    checks:
      - miner-seeds status freshness
      - Traveler report to Miner request to Miner intake confirmation
      - seed errors and zero-accepted anomalies
      - review queue pending count and oldest pending age
      - guard token and operations channel configuration presence
    safety:
      side_effects: read-only digest, optional append-only Guard issue queue write, and optional Discord report posting
      secrets: never print Discord bot token values

  - id: skillopt-readiness-audit
    name: SkillOpt readiness audit
    type: local-check
    owner_agent: skillopt-auditor
    command_refs:
      - python3 scripts/skillopt_audit.py --codex-skills .codex/skills --runtime-skills skills --agents runtime/agents.yaml --jobs runtime/jobs.yaml --out .omx/reports/skillopt/skillopt-audit-latest.json --markdown
    triggers:
      - before skill optimization changes
      - manual
    outputs:
      - .omx/reports/skillopt/skillopt-audit-latest.json
      - .omx/reports/skillopt/skillopt-audit-latest.md
      - skill inventory, gap matrix, runtime mapping, and sanitized PaperWiki evidence map
    safety: local read-only audit; no skill mutation, no PaperWiki vault writes, no Discord/EC2/Hermes side effects, no absolute vault path output

  - id: skillopt-evaluation-harness
    name: SkillOpt evaluation harness
    type: local-check
    owner_agent: skillopt-auditor
    command_refs:
      - python3 scripts/skillopt_eval.py --fixtures tests/fixtures/skillopt --out .omx/reports/skillopt/skillopt-eval-latest.json
    triggers:
      - before accepting SkillOpt bounded skill edits
      - after skill optimization proposals are generated
      - manual
    outputs:
      - .omx/reports/skillopt/skillopt-eval-latest.json
      - held-out verdicts for academic-technical-filter, blog-research-post, and jiphyeonjeon-reporter-article-post
      - reviewer-gated acceptance evidence; no automatic skill mutation
    safety: local deterministic evaluation only; no skill mutation, no PaperWiki vault writes, no Discord/EC2/Hermes side effects, no absolute vault path output, no automatic accept without reviewer and critic gates

  - id: skillopt-patch-proposal
    name: SkillOpt patch proposal queue
    type: local-check
    owner_agent: skillopt-auditor
    command_refs:
      - python3 scripts/skillopt_propose.py --audit .omx/reports/skillopt/skillopt-audit-latest.json --eval .omx/reports/skillopt/skillopt-eval-latest.json --out-dir .omx/reports/skillopt/patch-candidates
      - python3 scripts/skillopt_propose.py reject .omx/reports/skillopt/patch-candidates/<skill>/<proposal>.json --reason <reason> --buffer .omx/reports/skillopt/rejected-edits.jsonl
      - python3 scripts/skillopt_propose.py validate-lineage <accepted-lineage-fixture-or-temp-jsonl>
    triggers:
      - after skillopt readiness audit and evaluation harness pass
      - before controlled apply of SkillOpt bounded edits
      - manual
    outputs:
      - .omx/reports/skillopt/patch-candidates/<skill>/<proposal>.json
      - .omx/reports/skillopt/rejected-edits.jsonl
      - schema validation for Phase 4 accepted-lineage records
      - reviewer-gated and critic-gated proposal evidence; no automatic skill mutation
    safety: local deterministic proposal generation only; no skill mutation, no automatic accept, reviewer and critic gates required, no PaperWiki vault writes, no Discord/EC2/Hermes side effects, no absolute vault path output, live accepted-lineage writes are Phase 4-only

  - id: jiphyeonjeon-audit-team-digest
    name: Jiphyeonjeon Audit Team integrated operations digest
    type: health-check
    owner_agent: jiphyeonjeon-audit-team
    command_refs:
      - uv run discord-openclaw-audit-team
