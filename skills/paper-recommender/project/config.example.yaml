jiphyeonjeon:
  base_url: https://jiphyeonjeon.kr
  token_env: JIPHYEONJEON_TOKEN
  timeout_sec: 60

openclaw:
  base_url: http://127.0.0.1:18789/v1
  token_env: OPENCLAW_GATEWAY_TOKEN
  primary_model: openclaw/clawbridge
  fallback_model: openclaw/default
  timeout_sec: 120

profile:
  cache_ttl_days: 7
  # When bookmarks exist, seed_topics are used as fallback only.
  # A future management page will overwrite this list.
  seed_topics:
    - dynamic word embedding
    - dynamic graph embedding
    - diachronic semantic change
  max_bookmarks_for_profile: 40
  # Also build a narrative Markdown profile for the A/B experiment.
  # Disable to skip the extra LLM call and stay on keyword rerank.
  narrative_enabled: true

candidates:
  per_keyword: 20
  related_per_bookmark: 15
  related_from_top_n_bookmarks: 3
  year_start: 2018
  year_end: null
  total_cap: 200

rerank:
  batch_size: 10
  top_k: 10
  min_score: 3.0
  temperature: 0.2
  # A/B modes for evaluating whether narrative profile beats keyword profile.
  # "keywords" = current baseline; "narrative" = rerank with profile.md;
  # "soul"     = rerank with evolving SOUL.md (preferred when soul enabled);
  # "ab"       = run both each day and log overlap for offline comparison.
  # After ~2 weeks of data in state/ab_log.jsonl, decide whether to keep narrative.
  mode: ab
  # Listwise forced-rank prompting (default): the LLM returns a strict 1..N ranking
  # per batch, normalized linearly to scores 1..5. Prevents the "all 5/5" collapse
  # that pointwise scoring produces on pre-filtered candidate batches.
  # Set to "pointwise" to roll back to the legacy per-item score prompt.
  scoring_mode: listwise
  # Inject the search backend's cross-encoder relevance score (0..1) as an anchor
  # in each candidate line. Strongly improves intra-batch differentiation when the
  # backend reports it. Disable to drop the dependency.
  use_relevance_anchor: true

seen:
  cooldown_days: 30

soul:
  # Per-user evolving Markdown profile at state/souls/{user_id}.md.
  # user_id is derived from the JWT 'sub' claim (sanitized, allowlisted).
  # Evolves daily: old content preserved, new bookmarks + recent picks folded in,
  # one dated Changelog line appended per update. Compacts when over
  # compact_at_bytes; refuses update if still oversized after compact.
  enabled: true
  update_cadence_days: 1
  max_bytes: 3072
  compact_at_bytes: 2560
  include_recent_picks_days: 5

decay:
  # Exponential time-decay weighting on bookmarks. Older bookmarks still
  # contribute, just less. Set half_life_days: 0 to disable.
  enabled: true
  half_life_days: 60

feedback:
  # Read/dislike markers parsed from sync-back of recommendations.md.
  # User adds [read] or [dislike: reason] inside a paper section in the daily
  # note; sync-results.sh ships the last lookback_days of notes back to
  # state/feedback_inbox/. Defenses against feedback-loop drift:
  #   - frontmatter date check (no notes older than lookback_days)
  #   - file size cap (max_file_kb)
  #   - regex allowlist (only [read] / [dislike: ...] tokens extracted)
  #   - feedback_log.jsonl idempotency (each marker processed at most once)
  enabled: true
  lookback_days: 7
  max_file_kb: 512
  inbox_subdir: feedback_inbox

output:
  artifacts_dir: artifacts
  daily_subdir_fmt: "%Y-%m-%d"
  note_filename: recommendations.md
  raw_filename: raw.json

weekly_report:
  # Weekly SOUL-anchored trend report. This is separate from daily picks and
  # writes artifacts/weekly/YYYY-Www/research-trends.md plus raw.json.
  enabled: true
  cadence_days: 7
  max_queries: 10
  per_query: 20
  candidate_cap: 120
  top_papers: 20
  weekly_seen_cooldown_days: 60
  output_subdir_fmt: "weekly/%G-W%V"
  note_filename: research-trends.md
  raw_filename: raw.json
  min_evidence_per_cluster: 2
  # Optional year filters forwarded to Jiphyeonjeon search. Keep null unless
  # the backend/source corpus needs explicit recency narrowing.
  year_start: null
  year_end: null

daily_research:
  # Multi-source daily research pipeline (academic + tech web). Active by
  # default — when this section is absent the legacy daily/weekly modes run
  # as before. Activated by `paper-recommender daily-research` subcommand.
  #
  # Phase B ships academic + tech-web adapters. RSS covers Medium and
  # first-party company/engineering blogs without scraping pages. manual_links
  # is the compliance-safe path for LinkedIn or other user-provided URLs.
  sources:
    enabled:
      - arxiv
      - hackernews
      - jiphyeonjeon
      - huggingface_papers
      # - rss
      # - manual_links
    max_per_source: 50
    year_from: 2024
    timeout_sec: 30.0
    # RSS/Atom metadata only; does not fetch full article pages. Medium examples:
    #   https://medium.com/feed/tag/agentic-ai
    #   https://medium.com/feed/@username
    rss_feeds: []  # legacy alias for rss.feed_urls
    rss:
      feed_urls: []
      max_summary_chars: 700
    # Compliance-safe LinkedIn/industry intake: local JSONL with explicit
    # user-provided URL metadata. No login, crawling, or scraping is performed.
    # JSONL fields: title, url, summary, author/authors, published_at, source, tags.
    manual_links:
      paths: []
      max_file_kb: 512
      max_summary_chars: 700
    # Safe Google-account newsletter intake: no live Gmail access or OAuth.
    # Export newsletters with Google Takeout (Mail mbox) or another local mbox
    # flow, then put real paths/allowlists only in the deployed config.yaml.
    # Keep disabled until explicit local export paths and sender/subject
    # allowlists are configured.
    google_newsletters:
      mbox_paths: []
      sender_allowlist: []
      subject_allowlist: []
      max_messages: 200
      max_mbox_bytes: 52428800
  cluster:
    # Clusters candidate items via OpenClaw gateway embeddings. The gateway
    # exposes an OpenAI-compatible /v1/embeddings endpoint, so no extra
    # python deps are required.
    max_clusters: 3
    embedding_model: openclaw/clawbridge
    embedding_endpoint: /v1/embeddings
  deep:
    # Each surviving cluster is handed off to AutoResearchClaw for a
    # multi-minute deep run. Empirical 25-35 min per topic. concurrency=1
    # keeps the single OpenClaw gateway worker from contending with itself.
    enabled: true
    concurrency: 1
    timeout_sec: 2400        # 40 min hard cap per topic (>= empirical max)
    mode: full-auto          # researchclaw HITL mode; "express" is faster but shallower
    run_topic_script: ~/.openclaw/workspace/skills/researchclaw/run-topic.sh
    artifacts_root: ~/.openclaw/workspace/projects/AutoResearchClaw/artifacts
  auth:
    # Login-based auth replaces the static JIPHYEONJEON_TOKEN. Set
    # JIPHYEONJEON_USERNAME and JIPHYEONJEON_PASSWORD in the EC2 .env;
    # the dataclass stores only env-var names so secrets never enter config.
    base_url: https://jiphyeonjeon.kr
    username_env: JIPHYEONJEON_USERNAME
    password_env: JIPHYEONJEON_PASSWORD
    timeout_sec: 30.0
  # Days a cluster is suppressed from a deep-run after it last got one,
  # so the same dominant topic doesn't eat a deep slot every day.
  deep_seen_cooldown_days: 7
